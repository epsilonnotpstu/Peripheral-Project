<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Edge AI ECG Monitoring System — Real-time arrhythmia detection">
  <title>ECG Monitor — {% block title %}Dashboard{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons 1.11 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom dashboard CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

  {% block head_extra %}{% endblock %}
</head>

<body>

<!-- ── Navbar ───────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-ecg d-flex justify-content-between align-items-center px-3 py-2">
  <div class="d-flex align-items-center gap-3">
    <span class="navbar-brand-ecg">
      <i class="bi bi-heart-pulse-fill"></i>ECG Monitor
    </span>
    <span class="badge bg-secondary" id="mode-badge" style="font-size:0.7rem">
      {% if simulate_mode %}SIMULATION{% else %}LIVE{% endif %}
    </span>
  </div>
  <div class="d-flex align-items-center gap-2">
    <span class="badge bg-secondary" id="model-badge">
      {% if model_loaded %}
        <i class="bi bi-cpu-fill text-success"></i> AI Ready
      {% else %}
        <i class="bi bi-exclamation-triangle text-warning"></i> No Model
      {% endif %}
    </span>
    <span class="badge bg-danger" id="connection-badge">
      <i class="bi bi-wifi-off"></i> Disconnected
    </span>
  </div>
</nav>

<!-- ── Alert Toast (top-right) ──────────────────────────────────────────────── -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
  <div id="alert-toast" class="toast ecg-toast" role="alert" aria-live="assertive">
    <div class="toast-header">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <strong class="me-auto">Clinical Alert</strong>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body" id="alert-message">Alert message here.</div>
  </div>
</div>

<!-- ── Main content ──────────────────────────────────────────────────────────── -->
<div class="container-fluid px-3 py-2">
  {% block content %}{% endblock %}
</div>

<!-- ── Scripts ──────────────────────────────────────────────────────────────── -->
<!-- Bootstrap 5 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js 4 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<!-- Socket.IO 4 -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<!-- App JS -->
<script src="{{ url_for('static', filename='js/ecg_chart.js') }}"></script>
<script src="{{ url_for('static', filename='js/socket_client.js') }}"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

{% block scripts_extra %}{% endblock %}
</body>
</html>
