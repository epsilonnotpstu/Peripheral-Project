<!-- Real-time ECG Waveform Chart -->
<div class="ecg-card mt-2">
  <div class="ecg-label">
    <i class="bi bi-activity me-1"></i>REAL-TIME ECG — <span id="ecg-fs-label">125 Hz</span>
  </div>
  <div style="margin-top: 1.2rem;">
    <canvas id="ecg-canvas" role="img" aria-label="Real-time ECG waveform"></canvas>
  </div>
  <!-- Speed/zoom controls -->
  <div class="d-flex justify-content-end gap-2 mt-1" style="font-size:0.75rem;color:var(--text-secondary)">
    <span>Window:</span>
    <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="window.ecgChart && window.ecgChart.setWindow(3)">3s</button>
    <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="window.ecgChart && window.ecgChart.setWindow(5)">5s</button>
    <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="window.ecgChart && window.ecgChart.setWindow(10)">10s</button>
  </div>
</div>
